name: Deploy Worker Service

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/inkpulse-worker

jobs:
  build-and-deploy:
    name: ⚡ Build & Deploy .NET Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK & GKE auth plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials inkpulse-cluster \
            --zone asia-southeast1-a \
            --project renticar-478014

      - name: Smart ConfigMap Update & Deploy
        env:
          CONFIG_SECRET_CONTENT: ${{ secrets.CONFIG_APPSETTINGS_JSON }}
        run: |
          # Smart normalization helper function (ignores CRLF/LF & empty trailing lines)
          normalize_hash() {
            echo "$1" | tr -d '\r' | sed -e 's/[[:space:]]*$//' -e '/^$/d' | sha256sum | awk '{print $1}'
          }

          # 1. Fetch current ConfigMap from K8s
          OLD_CONTENT=$(kubectl get configmap inkpulse-worker-config -o jsonpath='{.data.appsettings\.json}' 2>/dev/null || echo "")

          # 2. Get new content from Secret or Repo File
          NEW_CONTENT=""
          if [ -n "$CONFIG_SECRET_CONTENT" ]; then
            NEW_CONTENT="$CONFIG_SECRET_CONTENT"
          elif [ -f appsettings.json ]; then
            NEW_CONTENT=$(cat appsettings.json)
          fi

          # 3. Compare normalized SHA256 hashes
          OLD_HASH=$(normalize_hash "$OLD_CONTENT")
          NEW_HASH=$(normalize_hash "$NEW_CONTENT")

          CONFIG_CHANGED=false
          if [ -n "$NEW_CONTENT" ] && [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "⚡ ConfigMap inkpulse-worker-config changed! Applying update..."
            echo "$NEW_CONTENT" | kubectl create configmap inkpulse-worker-config --from-file=appsettings.json=/dev/stdin --dry-run=client -o yaml | kubectl apply -f -
            CONFIG_CHANGED=true
          else
            echo "✅ [SKIP] ConfigMap inkpulse-worker-config has no meaningful changes (CRLF/whitespace ignored)."
          fi

          # 4. Set deployment image (triggers rollout automatically)
          kubectl set image deployment/worker-deployment app=${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl rollout status deployment/worker-deployment --timeout=300s || {
            echo "❌ Deploy failed! Auto rolling back to previous version..."
            kubectl rollout undo deployment/worker-deployment
            exit 1
          }

      - name: Post-Deploy Health Check
        run: |
          echo "🔍 Running post-deploy health check..."
          kubectl wait --for=condition=ready pod -l app=worker-core --timeout=300s || {
            echo "❌ Health check failed! Pods not ready."
            kubectl rollout undo deployment/worker-deployment
            exit 1
          }
          READY=$(kubectl get deployment worker-deployment -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment worker-deployment -o jsonpath='{.spec.replicas}')
          echo "✅ Health check passed: $READY/$DESIRED pods ready and serving traffic."

      - name: 🔔 Send Discord Notification
        if: always()
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            echo "⚠️ DISCORD_WEBHOOK secret not found. Skipping notification."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993
            TITLE="🚀 Worker Deploy Successful!"
          else
            COLOR=15158332
            TITLE="❌ Worker Deploy Failed!"
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"${{ github.event.head_commit.message }}\"}
                ],
                \"footer\": {\"text\": \"InkPulse CI/CD Bot\"}
              }]
            }" ${{ secrets.DISCORD_WEBHOOK }}
